services:
  moodle-db:
    image: mariadb:11.4
    container_name: moodle-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodleuser
      MYSQL_PASSWORD: moodlepass
    volumes:
      - moodle_db_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-file-per-table=1

  moodle:
    image: bitnamilegacy/moodle:latest
    container_name: moodle-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      BITNAMI_DEBUG: "true"
      MOODLE_DATABASE_TYPE: mariadb
      MOODLE_DATABASE_HOST: moodle-db
      MOODLE_DATABASE_PORT_NUMBER: 3306
      MOODLE_DATABASE_NAME: moodle
      MOODLE_DATABASE_USER: moodleuser
      MOODLE_DATABASE_PASSWORD: moodlepass
      MOODLE_USERNAME: admin
      MOODLE_PASSWORD: Admin123!
      MOODLE_EMAIL: admin@example.com
      MOODLE_SITE_NAME: "Kometa Prueba Tecnica"
    volumes:
      - moodle_data:/bitnami/moodle
      - moodle_moodledata:/bitnami/moodledata
    depends_on:
      - moodle-db

volumes:
  moodle_db_data:
  moodle_data:
  moodle_moodledata: